# nginx vhost for sadot.lavit.io  (aiserver, 192.168.50.16)
# Copy to /etc/nginx/sites-available/sadot and symlink into sites-enabled.
#
# LAB ROUTER MODEL (192.168.50.1): this server does NOT receive traffic on :80.
#   ext :443  SNI passthrough  sadot.lavit.io -> aiserver:443  (TLS terminated HERE)
#   ext :80   Host proxy       sadot.lavit.io -> aiserver:8080 (HTTP; ACME + redirect)
# So the HTTP server listens on 8080, not 80. Mirrors the crm.lavit.io vhost.
#
#   frontend (Next.js)  -> 127.0.0.1:3001
#   backend  (FastAPI)  -> 127.0.0.1:8001  (paths already prefixed with /api)
#
# Cert (HTTP-01 works once router :80->:8080 forwarding is live):
#   sudo certbot certonly --webroot -w /var/www/html -d sadot.lavit.io
# Then this file's 443 block references the issued cert. nginx -t && reload.

server {
    listen 8080;
    listen [::]:8080;
    server_name sadot.lavit.io;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name sadot.lavit.io;

    ssl_certificate     /etc/letsencrypt/live/sadot.lavit.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sadot.lavit.io/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20m;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Static mockups for customer review (served from /var/www/sadot-mockups,
    # synced from the repo's mockups/index.html by deploy/deploy.sh).
    location = /mockups { return 301 /mockups/; }
    location /mockups/ {
        alias /var/www/sadot-mockups/;
        index index.html;
        try_files $uri $uri/ /mockups/index.html;
    }

    # API: keep the /api prefix; backend serves /api/v1/..., /health, /docs.
    location /api/ {
        proxy_pass http://127.0.0.1:8001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Frontend (server-rendered Next.js).
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
