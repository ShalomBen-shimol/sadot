# nginx vhost for sadot.lavit.io  (aiserver, 192.168.50.16)
# Copy to /etc/nginx/sites-available/sadot and symlink into sites-enabled.
#
# LAB ROUTER MODEL (192.168.50.1): this server does NOT receive traffic on :80.
#   ext :443  SNI passthrough  sadot.lavit.io -> aiserver:443  (TLS terminated HERE)
#   ext :80   Host proxy       sadot.lavit.io -> aiserver:8080 (HTTP; ACME + redirect)
#
# HYBRID LAYOUT:
#   /            -> WordPress (basadot migration)  127.0.0.1:8090  (basadot-wp compose)
#   /api/        -> Sadot CRM backend (FastAPI)    127.0.0.1:8001
#   /mockups/    -> static customer mockups        /var/www/sadot-mockups
#   (/crm        -> Sadot CRM frontend 3001 — added once the Next.js basePath build lands)
#
# Cert: sudo certbot certonly --webroot -w /var/www/html -d sadot.lavit.io

server {
    listen 8080;
    listen [::]:8080;
    server_name sadot.lavit.io;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name sadot.lavit.io;

    ssl_certificate     /etc/letsencrypt/live/sadot.lavit.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sadot.lavit.io/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 128m;   # WordPress media uploads

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Static mockups for customer review.
    location = /mockups { return 301 /mockups/; }
    location /mockups/ {
        alias /var/www/sadot-mockups/;
        index index.html;
        try_files $uri $uri/ /mockups/index.html;
    }

    # Sadot CRM backend (FastAPI). WordPress uses /wp-json, so /api is free.
    location /api/ {
        proxy_pass http://127.0.0.1:8001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # WordPress (basadot) at root. TLS terminated here -> tell WP it's https
    # (mu-plugin 00-ssl-proxy.php trusts X-Forwarded-Proto).
    location / {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }
}
