# nginx vhost for sadot.lavit.io
# Copy to /etc/nginx/sites-available/sadot and symlink into sites-enabled.
# certbot --nginx will add the TLS (443) server block automatically.
#
#   frontend (Next.js)  -> 127.0.0.1:3001
#   backend  (FastAPI)  -> 127.0.0.1:8001  (paths already prefixed with /api)

server {
    listen 80;
    listen [::]:80;
    server_name sadot.lavit.io;

    client_max_body_size 20m;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # API: keep the /api prefix; backend serves /api/v1/... , /health, /docs.
    location /api/ {
        proxy_pass http://127.0.0.1:8001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Frontend (server-rendered Next.js).
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
