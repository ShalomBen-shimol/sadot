# Production override for the aiserver box (live host: existing CRM on :8000,
# system Postgres on :5432, nginx on 80/443/8080).
#
# Run with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Secrets are taken from a root-level .env (NOT committed) via ${VAR} substitution.
# Host ports are bound to 127.0.0.1 only — nginx is the sole public entrypoint.
services:
  db:
    # Dedicated Postgres for this app; not published to the host (internal only).
    # !override replaces the base list instead of appending to it.
    ports: !reset []
    environment:
      POSTGRES_USER: sadot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: sadot

  backend:
    environment:
      DATABASE_URL: postgresql+psycopg2://sadot:${POSTGRES_PASSWORD}@db:5432/sadot
      SECRET_KEY: ${SECRET_KEY}
      ENVIRONMENT: production
      FIRST_ADMIN_EMAIL: ${FIRST_ADMIN_EMAIL}
      FIRST_ADMIN_PASSWORD: ${FIRST_ADMIN_PASSWORD}
      FIRST_ADMIN_NAME: ${FIRST_ADMIN_NAME}
      BACKEND_CORS_ORIGINS: https://sadot.lavit.io
    ports: !override
      - "127.0.0.1:8001:8000"

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: https://sadot.lavit.io
    environment:
      NEXT_PUBLIC_API_URL: https://sadot.lavit.io
      INTERNAL_API_URL: http://backend:8000
    ports: !override
      - "127.0.0.1:3001:3000"
