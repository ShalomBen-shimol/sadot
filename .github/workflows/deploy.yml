name: Deploy to aiserver

# Auto-deploy on push to main. Skip by putting "[skip deploy]" in the commit message.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-aiserver
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Run tests
        env:
          DATABASE_URL: "sqlite://"
        run: python -m pytest

  deploy:
    needs: test
    if: ${{ !contains(github.event.head_commit.message, '[skip deploy]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SADOT_SSH_HOST }}
          port: ${{ secrets.SADOT_SSH_PORT }}
          username: ${{ secrets.SADOT_SSH_USER }}
          key: ${{ secrets.SADOT_SSH_KEY }}
          command_timeout: 20m
          script: |
            set -e
            cd /home/aiserver/projects/sadot
            git fetch --prune origin
            git reset --hard origin/main
            chmod +x deploy/deploy.sh
            ./deploy/deploy.sh
